<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全統小チャレンジ！ 小学２年生</title>
  <style>
    :root {
      --kokugo: #E85D75;
      --sansu: #3B82F6;
      --accent: #F59E0B;
      --green: #10B981;
      --red: #EF4444;
      --bg: #FFFBF0;
      --text: #1F2937;
      --gray: #6B7280;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro','ヒラギノ角ゴ Pro','Meiryo','Yu Gothic',sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg,#FF6B35,#F7C948);
      padding: 14px 20px; text-align: center;
      box-shadow: 0 3px 12px rgba(255,107,53,.35);
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { color:#fff; font-size:clamp(.95rem,3.5vw,1.35rem); text-shadow:0 2px 4px rgba(0,0,0,.2); }
    header .subtitle { color:rgba(255,255,255,.9); font-size:.75rem; margin-top:2px; }

    /* ===== BREADCRUMB ===== */
    #breadcrumb {
      display:flex; align-items:center; gap:6px;
      padding:10px 20px; font-size:.82rem; color:var(--gray);
      background:var(--white); border-bottom:1px solid #E5E7EB; min-height:38px;
    }
    #breadcrumb span { cursor:pointer; }
    #breadcrumb span:hover { text-decoration:underline; color:var(--text); }
    #breadcrumb .sep { color:#D1D5DB; }

    /* ===== SCREENS ===== */
    .screen { display:none; }
    .screen.active { display:block; }
    .container { max-width:680px; margin:0 auto; padding:20px 16px 48px; }

    /* ===== NICKNAME (HOME) ===== */
    .nickname-setup-card {
      background: linear-gradient(135deg,#FFFDE7,#FFF9C4);
      border: 2px dashed var(--accent);
      border-radius: 16px; padding:16px; margin-bottom:16px; text-align:center;
    }
    .nickname-setup-card p { font-weight:bold; margin-bottom:12px; font-size:1rem; }
    .nick-input-row { display:flex; gap:8px; }
    .nick-input {
      flex:1; padding:11px 12px; border-radius:10px;
      border:2px solid #E5E7EB; font-size:1rem; font-family:inherit; outline:none;
    }
    .nick-input:focus { border-color:var(--accent); }
    .nick-save-btn {
      padding:11px 16px; background:var(--accent); color:#78350F;
      border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-family:inherit;
      white-space:nowrap;
    }
    .nick-save-btn:hover { background:#D97706; }
    .nickname-greeting {
      background:linear-gradient(135deg,#FFF0F3,#FFFDE7);
      border-radius:16px; padding:14px 18px; margin-bottom:16px;
      display:flex; align-items:center; gap:10px; font-size:1rem; font-weight:bold;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
    }
    .greeting-wave { font-size:1.4rem; }
    .greeting-msg { flex:1; line-height:1.4; }
    .edit-nick-btn {
      padding:6px 12px; background:#F3F4F6;
      border:1px solid #E5E7EB; border-radius:8px;
      cursor:pointer; font-size:.78rem; font-family:inherit; white-space:nowrap;
    }
    .edit-nick-btn:hover { background:#E5E7EB; }

    /* ===== HOME CARDS ===== */
    .home-welcome { text-align:center; padding:20px 0 14px; }
    .home-welcome .mascot { font-size:3.5rem; }
    .home-welcome h2 { font-size:clamp(1.1rem,4.5vw,1.6rem); margin-top:8px; line-height:1.4; }
    .home-welcome p { color:var(--gray); font-size:.88rem; margin-top:6px; }
    .subject-cards { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px; }
    .subject-card {
      border-radius:20px; padding:26px 14px; text-align:center;
      cursor:pointer; border:none; transition:transform .15s,box-shadow .15s; font-family:inherit;
    }
    .subject-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.15); }
    .subject-card.kokugo {
      background:linear-gradient(135deg,#E85D75,#F997A8);
      box-shadow:0 4px 16px rgba(232,93,117,.35);
    }
    .subject-card.sansu {
      background:linear-gradient(135deg,#3B82F6,#60A5FA);
      box-shadow:0 4px 16px rgba(59,130,246,.35);
    }
    .subject-card .card-icon { font-size:2.6rem; }
    .subject-card .card-title { color:#fff; font-size:1.45rem; font-weight:bold; margin-top:8px; }
    .subject-card .card-desc { color:rgba(255,255,255,.85); font-size:.75rem; margin-top:4px; }
    .records-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; margin-top:14px; padding:14px;
      border-radius:14px; border:2px solid #E5E7EB;
      background:var(--white); color:var(--text);
      font-family:inherit; font-size:.95rem; font-weight:bold; cursor:pointer; transition:all .15s;
    }
    .records-btn:hover { border-color:#9CA3AF; background:#F9FAFB; transform:translateY(-2px); }

    /* ===== MENU ===== */
    .menu-header { display:flex; align-items:center; gap:12px; padding:18px 0 4px; }
    .menu-header .icon { font-size:1.9rem; }
    .menu-header h2 { font-size:1.45rem; font-weight:bold; }
    .menu-header.kokugo h2 { color:var(--kokugo); }
    .menu-header.sansu h2  { color:var(--sansu); }
    .menu-desc { color:var(--gray); font-size:.85rem; margin-bottom:18px; }
    .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
    .menu-card {
      border-radius:16px; padding:20px 12px; cursor:pointer;
      border:2.5px solid transparent; background:var(--white); text-align:center;
      font-family:inherit; transition:transform .15s,box-shadow .15s,border-color .15s;
    }
    .menu-card:hover { transform:translateY(-3px); }
    .menu-card.kokugo-card { border-color:#FBBCCA; }
    .menu-card.kokugo-card:hover { border-color:var(--kokugo); box-shadow:0 6px 18px rgba(232,93,117,.2); }
    .menu-card.sansu-card  { border-color:#BFDBFE; }
    .menu-card.sansu-card:hover  { border-color:var(--sansu);  box-shadow:0 6px 18px rgba(59,130,246,.2); }
    .menu-card .card-big-icon { font-size:2rem; }
    .menu-card .card-name { font-size:.95rem; font-weight:bold; margin-top:7px; }
    .menu-card.kokugo-card .card-name { color:var(--kokugo); }
    .menu-card.sansu-card  .card-name { color:var(--sansu); }
    .menu-card .card-sub { font-size:.7rem; color:var(--gray); margin-top:3px; }
    .menu-card .card-questions {
      display:inline-block; margin-top:9px;
      background:#F3F4F6; border-radius:10px; padding:2px 10px; font-size:.7rem; color:var(--gray);
    }

    /* ===== QUIZ ===== */
    .quiz-header { margin-bottom:18px; }
    .quiz-label {
      display:inline-flex; align-items:center; gap:6px;
      font-size:.82rem; font-weight:bold; padding:4px 14px; border-radius:20px; margin-bottom:10px;
    }
    .quiz-label.kokugo { background:#FEE2E9; color:var(--kokugo); }
    .quiz-label.sansu  { background:#DBEAFE; color:var(--sansu); }
    .progress-wrap { display:flex; align-items:center; gap:10px; }
    .progress-text { font-size:.82rem; color:var(--gray); white-space:nowrap; }
    .progress-bar { flex:1; height:10px; background:#E5E7EB; border-radius:10px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:10px; transition:width .4s ease; }
    .progress-fill.kokugo { background:linear-gradient(90deg,#E85D75,#F997A8); }
    .progress-fill.sansu  { background:linear-gradient(90deg,#3B82F6,#60A5FA); }
    .question-card {
      background:var(--white); border-radius:20px; padding:26px 22px;
      box-shadow:0 4px 20px rgba(0,0,0,.07); margin-top:18px;
    }
    .question-num { font-size:.78rem; color:var(--gray); margin-bottom:8px; }
    .question-text { font-size:clamp(1.05rem,3.8vw,1.3rem); font-weight:bold; line-height:1.65; white-space:pre-wrap; }
    .passage-box {
      background:#F9FAFB; border-left:4px solid var(--kokugo);
      border-radius:0 12px 12px 0; padding:13px 15px; margin:13px 0;
      font-size:.93rem; line-height:1.9;
    }
    .passage-box p { margin-bottom:4px; }
    .passage-box p:last-child { margin-bottom:0; }
    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:20px; }
    .option-btn {
      padding:15px 11px; border-radius:13px; border:2.5px solid #E5E7EB;
      background:var(--white); font-family:inherit; font-size:clamp(.93rem,2.8vw,1.03rem);
      font-weight:bold; cursor:pointer; transition:all .15s; text-align:center; line-height:1.4;
    }
    .option-btn:hover:not(:disabled) { border-color:#9CA3AF; background:#F9FAFB; }
    .option-btn.correct { border-color:var(--green); background:#D1FAE5; color:#065F46; }
    .option-btn.wrong   { border-color:var(--red);   background:#FEE2E2; color:#991B1B; }
    .option-btn:disabled { cursor:default; }
    .input-wrap { display:flex; align-items:center; gap:11px; margin-top:20px; }
    .answer-input {
      width:120px; padding:13px 14px; border-radius:13px;
      border:2.5px solid #E5E7EB; font-size:1.3rem; font-weight:bold;
      text-align:center; font-family:inherit; outline:none; transition:border-color .15s;
    }
    .answer-input:focus   { border-color:var(--accent); }
    .answer-input.correct { border-color:var(--green); background:#D1FAE5; }
    .answer-input.wrong   { border-color:var(--red);   background:#FEE2E2; }
    .submit-btn {
      padding:13px 26px; border-radius:13px; border:none;
      background:linear-gradient(135deg,#F59E0B,#FCD34D); color:#78350F;
      font-family:inherit; font-size:1rem; font-weight:bold; cursor:pointer;
      box-shadow:0 4px 12px rgba(245,158,11,.35); transition:transform .1s,box-shadow .1s;
    }
    .submit-btn:hover  { transform:translateY(-2px); }
    .submit-btn:active { transform:translateY(0); }
    .submit-btn:disabled { background:#E5E7EB; color:var(--gray); box-shadow:none; cursor:default; transform:none; }
    .feedback-box {
      margin-top:16px; padding:13px 16px; border-radius:13px;
      font-size:.93rem; font-weight:bold; display:none; align-items:center; gap:10px;
    }
    .feedback-box.show    { display:flex; }
    .feedback-box.correct-fb { background:#D1FAE5; color:#065F46; }
    .feedback-box.wrong-fb   { background:#FEE2E2; color:#991B1B; }
    .fb-icon { font-size:1.25rem; flex-shrink:0; }

    /* ===== EXPLANATION BOX ===== */
    .exp-box {
      margin-top:12px; padding:14px 16px;
      background:#F0FDF4; border:1.5px solid #86EFAC; border-radius:13px;
      display:none;
    }
    .exp-box.show { display:block; }
    .exp-title { font-size:.82rem; font-weight:bold; color:#059669; margin-bottom:7px; }
    .exp-body  { font-size:.92rem; line-height:1.75; color:var(--text); white-space:pre-wrap; }

    .next-btn {
      width:100%; margin-top:15px; padding:15px; border-radius:13px; border:none;
      background:var(--text); color:var(--white);
      font-family:inherit; font-size:1rem; font-weight:bold; cursor:pointer; display:none; transition:background .15s;
    }
    .next-btn:hover { background:#374151; }
    .next-btn.show  { display:block; }

    /* ===== RESULT ===== */
    .result-card {
      background:var(--white); border-radius:24px; padding:34px 26px; text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.08); margin-top:22px;
    }
    .result-icon  { font-size:4rem; }
    .result-title { font-size:1.55rem; font-weight:bold; margin-top:10px; }
    .result-score { font-size:3.2rem; font-weight:bold; margin:14px 0 4px; }
    .result-score .total { font-size:1.4rem; color:var(--gray); }
    .result-stars   { font-size:1.7rem; letter-spacing:4px; margin:7px 0; }
    .result-message { color:var(--gray); font-size:.93rem; margin-top:7px; line-height:1.6; }
    .result-breakdown { background:#F9FAFB; border-radius:13px; padding:15px; margin-top:22px; text-align:left; }
    .breakdown-title  { font-size:.83rem; color:var(--gray); margin-bottom:9px; }
    .breakdown-item {
      display:flex; align-items:flex-start; gap:9px; padding:7px 0;
      border-bottom:1px solid #E5E7EB; font-size:.86rem; line-height:1.5;
    }
    .breakdown-item:last-child { border-bottom:none; }
    .breakdown-icon { font-size:.95rem; flex-shrink:0; margin-top:1px; }
    .result-actions { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:22px; }
    .action-btn { padding:13px; border-radius:13px; border:none; font-family:inherit; font-size:.93rem; font-weight:bold; cursor:pointer; transition:transform .1s; }
    .action-btn:hover  { transform:translateY(-2px); }
    .action-btn.retry  { background:var(--accent); color:#78350F; }
    .action-btn.back   { background:#F3F4F6; color:var(--text); }

    /* ===== RECORDS ===== */
    .records-header { padding:18px 0 4px; }
    .records-header h2 { font-size:1.45rem; font-weight:bold; }
    .nick-record-box {
      background:linear-gradient(135deg,#FFF0F3,#FFFDE7);
      border-radius:16px; padding:14px 18px; margin:12px 0 20px;
      display:flex; align-items:center; gap:10px;
    }
    .nick-record-name { flex:1; font-size:1.1rem; font-weight:bold; }
    .nick-record-id   { font-size:.72rem; color:var(--gray); margin-top:2px; font-family:monospace; }
    .nick-edit-btn {
      padding:7px 13px; background:var(--white); border:1.5px solid #E5E7EB;
      border-radius:9px; cursor:pointer; font-size:.8rem; font-family:inherit;
    }
    .nick-edit-btn:hover { background:#F9FAFB; }
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; margin-bottom:22px; }
    .stat-card { background:var(--white); border-radius:15px; padding:15px 9px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .stat-val   { font-size:1.6rem; font-weight:bold; }
    .stat-label { font-size:.7rem; color:var(--gray); margin-top:3px; }
    .section-title { font-size:.83rem; font-weight:bold; color:var(--gray); margin:0 0 9px; letter-spacing:.04em; }
    .category-list { margin-bottom:22px; }
    .category-row { background:var(--white); border-radius:13px; padding:13px 15px; margin-bottom:9px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
    .category-row-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
    .category-row-name  { font-size:.9rem; font-weight:bold; }
    .category-row-score { font-size:.8rem; color:var(--gray); }
    .category-bar-bg { height:8px; background:#F3F4F6; border-radius:8px; overflow:hidden; }
    .category-bar-fill { height:100%; border-radius:8px; transition:width .6s ease; }
    .category-bar-fill.kokugo { background:linear-gradient(90deg,#E85D75,#F997A8); }
    .category-bar-fill.sansu  { background:linear-gradient(90deg,#3B82F6,#60A5FA); }
    .category-row-stars { font-size:.83rem; margin-top:5px; color:var(--accent); }
    .category-row-count { font-size:.7rem; color:var(--gray); }
    .history-list { margin-bottom:22px; }
    .history-item { display:flex; align-items:center; gap:11px; padding:11px 13px; background:var(--white); border-radius:11px; margin-bottom:7px; box-shadow:0 2px 6px rgba(0,0,0,.04); }
    .history-badge { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1.05rem; flex-shrink:0; }
    .history-badge.kokugo { background:#FEE2E9; }
    .history-badge.sansu  { background:#DBEAFE; }
    .history-info  { flex:1; }
    .history-label { font-size:.86rem; font-weight:bold; }
    .history-date  { font-size:.7rem; color:var(--gray); margin-top:2px; }
    .history-score { text-align:right; }
    .hs-val { font-size:.98rem; font-weight:bold; }
    .hs-pct { font-size:.7rem; color:var(--gray); }
    .clear-btn {
      width:100%; padding:12px; border-radius:11px; border:1.5px solid #FCA5A5;
      background:#FFF5F5; color:#EF4444; font-family:inherit; font-size:.86rem; cursor:pointer; margin-top:6px; transition:all .15s;
    }
    .clear-btn:hover { background:#FEE2E2; }
    .empty-records { text-align:center; padding:38px 18px; color:var(--gray); }
    .empty-records .empty-icon { font-size:2.8rem; }
    .empty-records p { margin-top:11px; font-size:.93rem; }

    /* ===== RESPONSIVE ===== */
    @media(max-width:420px){
      .options-grid { grid-template-columns:1fr; }
      .result-actions { grid-template-columns:1fr; }
      .stats-grid { grid-template-columns:repeat(3,1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>🌟 全統小チャレンジ！ 小学２年生 🌟</h1>
  <div class="subtitle">四谷学院 全国統一小学生試験 たいさく</div>
</header>

<div id="breadcrumb">
  <span onclick="goHome()">🏠 ホーム</span>
</div>

<!-- ===== HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="container">
    <div class="home-welcome">
      <div class="mascot">📚</div>
      <h2>さあ、べんきょうを<br>はじめよう！</h2>
      <p>もんだいに チャレンジして ☆を あつめよう！</p>
    </div>

    <!-- nickname section -->
    <div id="nickname-wrap" style="margin-top:18px;"></div>

    <div class="subject-cards">
      <button class="subject-card kokugo" onclick="showKokugoMenu()">
        <div class="card-icon">📖</div>
        <div class="card-title">国 語</div>
        <div class="card-desc">かんじ・ことば・どっかい</div>
      </button>
      <button class="subject-card sansu" onclick="showSansuMenu()">
        <div class="card-icon">🔢</div>
        <div class="card-title">算 数</div>
        <div class="card-desc">けいさん・くく・ずけい</div>
      </button>
    </div>
    <button class="records-btn" onclick="showRecords()">📊 がくしゅう きろくを 見る</button>
  </div>
</div>

<!-- ===== RECORDS ===== -->
<div id="screen-records" class="screen">
  <div class="container">
    <div class="records-header"><h2>📊 がくしゅう きろく</h2></div>
    <div id="nick-record-area"></div>
    <div id="records-content"></div>
  </div>
</div>

<!-- ===== KOKUGO MENU ===== -->
<div id="screen-kokugo" class="screen">
  <div class="container">
    <div class="menu-header kokugo"><div class="icon">📖</div><h2>国 語</h2></div>
    <div class="menu-desc">れんしゅうしたい もんだいを えらぼう！</div>
    <div class="menu-grid">
      <button class="menu-card kokugo-card" onclick="startQuiz('kanji-yomi')">
        <div class="card-big-icon">🔤</div>
        <div class="card-name">かんじの よみ</div>
        <div class="card-sub">かんじの よみかた</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card kokugo-card" onclick="startQuiz('kanji-kaki')">
        <div class="card-big-icon">✏️</div>
        <div class="card-name">かんじの かき</div>
        <div class="card-sub">かんじを えらぼう</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card kokugo-card" onclick="startQuiz('kotoba')">
        <div class="card-big-icon">💬</div>
        <div class="card-name">ことばの いみ</div>
        <div class="card-sub">はんたいご・なかまのことば</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card kokugo-card" onclick="startQuiz('dokkai')">
        <div class="card-big-icon">📝</div>
        <div class="card-name">よみとり</div>
        <div class="card-sub">ぶんを よんで こたえよう</div>
        <div class="card-questions">4もん</div>
      </button>
    </div>
  </div>
</div>

<!-- ===== SANSU MENU ===== -->
<div id="screen-sansu" class="screen">
  <div class="container">
    <div class="menu-header sansu"><div class="icon">🔢</div><h2>算 数</h2></div>
    <div class="menu-desc">れんしゅうしたい もんだいを えらぼう！</div>
    <div class="menu-grid">
      <button class="menu-card sansu-card" onclick="startQuiz('keisan')">
        <div class="card-big-icon">➕</div>
        <div class="card-name">たし算・ひき算</div>
        <div class="card-sub">ひっ算の れんしゅう</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card sansu-card" onclick="startQuiz('kuku')">
        <div class="card-big-icon">✖️</div>
        <div class="card-name">九 九</div>
        <div class="card-sub">かけ算の れんしゅう</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card sansu-card" onclick="startQuiz('mondai')">
        <div class="card-big-icon">📖</div>
        <div class="card-name">ぶんしょうだい</div>
        <div class="card-sub">もんだいを よんで こたえよう</div>
        <div class="card-questions">5もん</div>

// ===================================================
// STATE
// ===================================================
let state = {
  quizType:null, questions:[], current:0, score:0, answers:[], answered:false, parentScreen:null
};

// ===================================================
// API CONFIG
// バックエンドサーバーのURLを設定してください。
// ローカル開発: 'http://localhost:5000'
// 本番環境:    'https://your-app.railway.app' など
// 設定しない場合は localStorage のみで動作します。
// ===================================================
const API_BASE_URL = '';   // ← デプロイ後にサーバーURLを入力

// ===================================================
// STORAGE
// ===================================================
const DEVICE_KEY   = 'zentouho_device_id';
const RECORDS_KEY  = 'zentouho_records';
const NICKNAME_KEY = 'zentouho_nickname';

function uuid4() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
function getDeviceId() {
  let id = localStorage.getItem(DEVICE_KEY);
  if (!id) { id = uuid4(); localStorage.setItem(DEVICE_KEY, id); }
  return id;
}
function getNickname()      { return localStorage.getItem(NICKNAME_KEY) || ''; }
function setNickname(name)  { localStorage.setItem(NICKNAME_KEY, name.trim()); }

function getRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); }
  catch { return []; }
}
function saveRecord(quizType, score, total) {
  const bank    = QB[quizType];
  const payload = {
    deviceId: getDeviceId(),
    nickname: getNickname(),
    date:     new Date().toISOString(),
    quizType,
    label:    bank.label,
    subject:  bank.subject,
    score,
    total,
  };

  // localStorage に保存
  const records = getRecords();
  records.push({ id: uuid4(), ...payload });
  if (records.length > 500) records.splice(0, records.length - 500);
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));

  // サーバーにも送信（API_BASE_URL が設定されている場合）
  if (API_BASE_URL) {
    fetch(API_BASE_URL + '/api/result', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    }).catch(() => { /* オフライン時は無視 */ });
  }
}

// NICKNAME UI
// ===================================================
function renderNicknameSection() {

    wrap.innerHTML = `
      <div class="nickname-setup-card">
        <p>👤 ニックネームを きめよう！</p>
        <div class="nick-input-row">
          <input id="nick-input" class="nick-input" type="text" maxlength="10" placeholder="なまえを にゅうりょく">
          <button class="nick-save-btn" onclick="saveNickname()">けってい！</button>
        </div>
      </div>`;

  } else {

function saveNickname() {
  const inp = document.getElementById('nick-input');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  setNickname(val);
  renderNicknameSection();
}
function promptNicknameEdit() {
  const cur = getNickname();
  const val = prompt('ニックネームを かえよう！\n（10文字 いないで にゅうりょく）', cur);
  if (val === null) return;
  const trimmed = val.trim().slice(0, 10);
  if (trimmed) { setNickname(trimmed); renderNicknameSection(); }
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// NAVIGATION
// ===================================================
function showScreen(id) {

// ===================================================
// QUIZ START
// ===================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function startQuiz(type) {
  const bank = QB[type];
  state = { quizType:type, questions:[], current:0, score:0, answers:[], answered:false, parentScreen:state.parentScreen };

  if (type === 'dokkai') {
    const flat = [];
    bank.passages.forEach(p => p.questions.forEach(q => flat.push({ passage:p.text, ...q })));
    state.questions = flat.slice(0, bank.count);
  } else {
    state.questions = shuffle(bank.questions).slice(0, bank.count);
  }

  const subj = bank.subject;
  const parentLabel  = subj === 'kokugo' ? '📖 国語' : '🔢 算数';
  const parentAction = subj === 'kokugo' ? 'showKokugoMenu()' : 'showSansuMenu()';
  setBreadcrumb([
    {label:'🏠 ホーム', action:'goHome()'},
    {label:parentLabel,  action:parentAction},
    {label:bank.label,   action:null}
  ]);
  const lbl = document.getElementById('quiz-label');
  lbl.className = 'quiz-label ' + subj;
  lbl.textContent = (subj === 'kokugo' ? '📖 ' : '🔢 ') + bank.label;
  document.getElementById('progress-fill').className = 'progress-fill ' + subj;
  showScreen('quiz');
  renderQuestion();
}

// ===================================================
// RENDER QUESTION
// ===================================================
function renderQuestion() {
  const total = state.questions.length;
  const idx   = state.current;
  const q     = state.questions[idx];
  const bank  = QB[state.quizType];
  state.answered = false;

  document.getElementById('progress-text').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = (idx / total * 100) + '%';
  document.getElementById('question-num').textContent  = 'もんだい ' + (idx + 1);
  document.getElementById('question-text').textContent = q.q;

  // passage
  const pa = document.getElementById('passage-area');
  pa.innerHTML = q.passage
    ? '<div class="passage-box">' + q.passage.split('\n').map(l => '<p>' + escHtml(l) + '</p>').join('') + '</div>'
    : '';

  document.getElementById('options-area').innerHTML = '';
  document.getElementById('input-area').innerHTML   = '';

  const qtype = bank.type === 'dokkai' ? 'mc' : bank.type;
  if (qtype === 'mc') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.id = 'opt-' + i;
      btn.onclick = () => selectOption(i);
      grid.appendChild(btn);
    });
    document.getElementById('options-area').appendChild(grid);
  } else {
    document.getElementById('input-area').innerHTML =
      '<div class="input-wrap">' +
      '<input class="answer-input" type="number" id="fill-input" placeholder="こたえ" min="0" max="9999">' +
      '<button class="submit-btn" id="submit-btn" onclick="checkFill()">こたえる</button>' +
      '</div>';
    const inp = document.getElementById('fill-input');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkFill(); });
  }

  // reset feedback & exp
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('exp-box').className      = 'exp-box';
  document.getElementById('exp-body').textContent   = '';
  const nb = document.getElementById('next-btn');
  nb.className = 'next-btn';
  nb.textContent = idx === total - 1 ? 'けっかを 見る 🏆' : 'つぎへ →';
}

// ===================================================
// ANSWER HANDLING
// ===================================================
function selectOption(selected) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.current];
  const isCorrect = selected === q.ans;
  q.opts.forEach((_, i) => {
    const btn = document.getElementById('opt-' + i);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
  });
  recordAnswer(isCorrect, q.opts[selected], q.opts[q.ans], q);
  showFeedback(isCorrect, q);
}
function checkFill() {
  if (state.answered) return;
  const inp = document.getElementById('fill-input');
  const val = parseInt(inp.value, 10);
  if (isNaN(val)) { inp.focus(); return; }
  state.answered = true;
  const q = state.questions[state.current];
  const isCorrect = val === q.ans;
  inp.classList.add(isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;
  document.getElementById('submit-btn').disabled = true;
  if (!isCorrect) {
    const hint = document.createElement('div');
    hint.style.cssText = 'margin-top:8px;font-size:.86rem;color:#065F46;background:#D1FAE5;padding:8px 12px;border-radius:10px;';
    hint.textContent = 'こたえ：' + q.ans;
    document.getElementById('input-area').appendChild(hint);
  }
  recordAnswer(isCorrect, String(val), String(q.ans), q);
  showFeedback(isCorrect, q);
}
function recordAnswer(isCorrect, userAns, correctAns, q) {
  if (isCorrect) state.score++;
  state.answers.push({ correct:isCorrect, question:q.q.replace(/\n/g,' '), userAns, correctAns });
}
function showFeedback(isCorrect, q) {
  const fb   = document.getElementById('feedback-box');
  const icon = document.getElementById('fb-icon');
  const text = document.getElementById('fb-text');
  if (isCorrect) {
    fb.className = 'feedback-box correct-fb show';
    icon.textContent = '⭕';
    const msgs = ['せいかい！すごい！','すばらしい！','よくできました！','かんぺき！','その調子！'];
    text.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  } else {
    fb.className = 'feedback-box wrong-fb show';
    icon.textContent = '❌';
    text.textContent = 'ざんねん！ もう一度 かんがえてみよう。';
  }
  // explanation
  if (q.exp) {
    document.getElementById('exp-body').textContent = q.exp;
    document.getElementById('exp-box').className = 'exp-box show';
  }
  document.getElementById('next-btn').className = 'next-btn show';
}

// ===================================================
// NEXT / RESULT
// ===================================================
function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) showResult();
  else renderQuestion();
}
function showResult() {
  const score = state.score, total = state.questions.length;
  const pct = score / total;
  document.getElementById('progress-fill').style.width = '100%';
  saveRecord(state.quizType, score, total);

  let icon, title, message;
  if (pct === 1)     { icon='🏆'; title='かんぺき！';    message='ぜんもん せいかい！\nすごい！きみは 天才だ！'; }
  else if (pct>=.8)  { icon='🌟'; title='すばらしい！';  message='ほぼ かんぺき！\nもう少しで 満てんだよ！'; }
  else if (pct>=.6)  { icon='😊'; title='よくできました！'; message='なかなか いいね！\nまちがえた もんだいを もう一度 やってみよう！'; }
  else if (pct>=.4)  { icon='💪'; title='もう少し！';    message='もう一度 チャレンジして\nしっかり おぼえよう！'; }
  else               { icon='📚'; title='れんしゅうしよう！'; message='むずかしかったね。\nかいせつを 読んで もう一度！'; }

  const name = getNickname();
  const nameStr = name ? name + 'さん、' : '';

  document.getElementById('result-icon').textContent  = icon;
  document.getElementById('result-title').textContent = nameStr + title;
  document.getElementById('result-score').innerHTML   = score + '<span class="total"> / ' + total + '</span>';
  const stars = Math.round(pct * 5);
  document.getElementById('result-stars').textContent   = '★'.repeat(stars) + '☆'.repeat(5 - stars);
  document.getElementById('result-message').textContent = message;

  document.getElementById('result-breakdown').innerHTML =
    '<div class="breakdown-title">もんだいの ふりかえり</div>' +
    state.answers.map(a =>
      '<div class="breakdown-item"><span class="breakdown-icon">' + (a.correct ? '⭕' : '❌') + '</span>' +
      '<span>' + escHtml(a.question) + (a.correct ? '' : '　→ こたえ：' + escHtml(a.correctAns)) + '</span></div>'
    ).join('');

  showScreen('result');
}
function retryQuiz() { startQuiz(state.quizType); }

// RECORDS SCREEN
// ===================================================
function showRecords() {
  setBreadcrumb([{label:'🏠 ホーム',action:'goHome()'},{label:'📊 きろく',action:null}]);
  state.parentScreen = null;

  // nickname area
  const nickArea = document.getElementById('nick-record-area');
  const name = getNickname();
  const did  = getDeviceId().slice(0, 8) + '…';
  nickArea.innerHTML = `
    <div class="nick-record-box">
      <div>
        <div class="nick-record-name">${name ? '👤 ' + escHtml(name) + ' さん' : '👤 なまえ みせっていです'}</div>
        <div class="nick-record-id">ID: ${did}</div>
      </div>
      <button class="nick-edit-btn" onclick="promptNicknameEdit(); document.getElementById('nick-record-area').innerHTML=''; showRecords();">✏️ なまえを かえる</button>
    </div>`;

  renderRecordsContent();
  showScreen('records');
}

function renderRecordsContent() {
  const records = getRecords();
  const el = document.getElementById('records-content');
  if (records.length === 0) {
    el.innerHTML = '<div class="empty-records"><div class="empty-icon">📭</div><p>まだ きろくが ありません。<br>もんだいに チャレンジしよう！</p></div>';
    return;
  }
  const totalQ = records.reduce((s,r) => s + r.total, 0);
  const totalC = records.reduce((s,r) => s + r.score, 0);
  const pctAll = totalQ > 0 ? Math.round(totalC / totalQ * 100) : 0;
  const days   = new Set(records.map(r => r.date.slice(0,10))).size;

  let html = '<div class="stats-grid">'
    + sCard(records.length + '回', 'チャレンジした 数')
    + sCard(pctAll + '%', '正かいの わりあい')
    + sCard(days + '日', 'べんきょうした 日の 数')
    + '</div>';

  const cats    = Object.keys(QB);
  const kokugo  = cats.filter(k => QB[k].subject === 'kokugo');
  const sansu   = cats.filter(k => QB[k].subject === 'sansu');

  html += '<div class="section-title">📖 国語 カテゴリ別 さいこうスコア</div><div class="category-list">';
  html += kokugo.map(k => catRow(k, records, 'kokugo')).join('');
  html += '</div>';
  html += '<div class="section-title">🔢 算数 カテゴリ別 さいこうスコア</div><div class="category-list">';
  html += sansu.map(k => catRow(k, records, 'sansu')).join('');
  html += '</div>';

  const recent = [...records].reverse().slice(0, 15);
  html += '<div class="section-title">さいきんの きろく（さいしん 15けん）</div><div class="history-list">';
  html += recent.map(r => {
    const icon  = QB[r.quizType] && QB[r.quizType].subject === 'kokugo' ? '📖' : '🔢';
    const subj  = QB[r.quizType] ? QB[r.quizType].subject : 'sansu';
    const pct   = Math.round(r.score / r.total * 100);
    const dt    = new Date(r.date);
    const ds    = dt.getFullYear() + '/' + pad(dt.getMonth()+1) + '/' + pad(dt.getDate())
      + ' ' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());
    return '<div class="history-item">'
      + '<div class="history-badge ' + subj + '">' + icon + '</div>'
      + '<div class="history-info"><div class="history-label">' + escHtml(r.label) + '</div>'
      + '<div class="history-date">' + ds + '</div></div>'
      + '<div class="history-score"><div class="hs-val">' + r.score + '/' + r.total + '</div>'
      + '<div class="hs-pct">' + pct + '%</div></div>'
      + '</div>';
  }).join('');
  html += '</div>';
  html += '<button class="clear-btn" onclick="clearRecords()">🗑 きろくを ぜんぶ けす</button>';
  el.innerHTML = html;
}

function sCard(val, label) {
  return '<div class="stat-card"><div class="stat-val">' + val + '</div><div class="stat-label">' + label + '</div></div>';
}
function catRow(quizType, records, subject) {
  const bank = QB[quizType];
  const mine = records.filter(r => r.quizType === quizType);
  if (mine.length === 0) {
    return '<div class="category-row">'
      + '<div class="category-row-top"><span class="category-row-name">' + bank.label + '</span>'
      + '<span class="category-row-score">まだ ちょうせんしていません</span></div>'
      + '<div class="category-bar-bg"><div class="category-bar-fill ' + subject + '" style="width:0%"></div></div>'
      + '<div class="category-row-stars">☆☆☆☆☆</div><div class="category-row-count">0回</div>'
      + '</div>';
  }
  const best   = Math.max(...mine.map(r => r.score / r.total));
  const pct    = Math.round(best * 100);
  const stars  = Math.round(best * 5);
  const avgPct = Math.round(mine.reduce((s,r)=>s+r.score/r.total,0)/mine.length*100);
  return '<div class="category-row">'
    + '<div class="category-row-top"><span class="category-row-name">' + bank.label + '</span>'
    + '<span class="category-row-score">さいこう ' + pct + '% ／ へいきん ' + avgPct + '%</span></div>'
    + '<div class="category-bar-bg"><div class="category-bar-fill ' + subject + '" style="width:' + pct + '%"></div></div>'
    + '<div class="category-row-stars">' + '★'.repeat(stars) + '☆'.repeat(5 - stars) + '</div>'
    + '<div class="category-row-count">' + mine.length + '回 チャレンジ</div>'
    + '</div>';
}
function pad(n) { return String(n).padStart(2,'0'); }
function clearRecords() {
  if (!confirm('きろくを ぜんぶ けしますか？\nこの そうさは もとに もどせません。')) return;
  localStorage.removeItem(RECORDS_KEY);
  renderRecordsContent();
}
