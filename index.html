<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全統小チャレンジ！ 小学２年生</title>
  <style>
    :root {
      --kokugo: #E85D75;
      --kokugo-light: #FFF0F3;
      --sansu: #3B82F6;
      --sansu-light: #EFF6FF;
      --accent: #F59E0B;
      --green: #10B981;
      --red: #EF4444;
      --bg: #FFFBF0;
      --text: #1F2937;
      --gray: #6B7280;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro', 'Meiryo', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #FF6B35 0%, #F7C948 100%);
      padding: 14px 20px;
      text-align: center;
      box-shadow: 0 3px 12px rgba(255,107,53,0.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      color: #fff;
      font-size: clamp(1rem, 4vw, 1.4rem);
      letter-spacing: 0.05em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    header .subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    /* ===== BREADCRUMB ===== */
    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 0.82rem;
      color: var(--gray);
      background: var(--white);
      border-bottom: 1px solid #E5E7EB;
      min-height: 38px;
    }
    #breadcrumb span { cursor: pointer; }
    #breadcrumb span:hover { text-decoration: underline; color: var(--text); }
    #breadcrumb .sep { color: #D1D5DB; }

    /* ===== SCREENS ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ===== HOME ===== */
    .home-welcome {
      text-align: center;
      padding: 28px 0 16px;
    }
    .home-welcome .mascot { font-size: 4rem; }
    .home-welcome h2 {
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      margin-top: 10px;
      line-height: 1.4;
    }
    .home-welcome p {
      color: var(--gray);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .subject-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 28px;
    }
    .subject-card {
      border-radius: 20px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .subject-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .subject-card:active { transform: translateY(-1px); }
    .subject-card.kokugo {
      background: linear-gradient(135deg, #E85D75, #F997A8);
      box-shadow: 0 4px 16px rgba(232,93,117,0.35);
    }
    .subject-card.sansu {
      background: linear-gradient(135deg, #3B82F6, #60A5FA);
      box-shadow: 0 4px 16px rgba(59,130,246,0.35);
    }
    .subject-card .card-icon { font-size: 2.8rem; }
    .subject-card .card-title {
      color: #fff;
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 10px;
    }
    .subject-card .card-desc {
      color: rgba(255,255,255,0.85);
      font-size: 0.78rem;
      margin-top: 6px;
    }

    /* ===== MENU GRIDS ===== */
    .menu-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0 4px;
    }
    .menu-header .icon { font-size: 2rem; }
    .menu-header h2 { font-size: 1.5rem; font-weight: bold; }
    .menu-header.kokugo h2 { color: var(--kokugo); }
    .menu-header.sansu h2 { color: var(--sansu); }

    .menu-desc {
      color: var(--gray);
      font-size: 0.85rem;
      margin-bottom: 20px;
      padding-left: 4px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .menu-card {
      border-radius: 16px;
      padding: 22px 14px;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      background: var(--white);
      text-align: center;
      font-family: inherit;
    }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .menu-card.kokugo-card { border-color: #FBBCCA; }
    .menu-card.kokugo-card:hover { border-color: var(--kokugo); box-shadow: 0 6px 20px rgba(232,93,117,0.2); }
    .menu-card.sansu-card { border-color: #BFDBFE; }
    .menu-card.sansu-card:hover { border-color: var(--sansu); box-shadow: 0 6px 20px rgba(59,130,246,0.2); }
    .menu-card .card-big-icon { font-size: 2.2rem; }
    .menu-card .card-name { font-size: 1rem; font-weight: bold; margin-top: 8px; }
    .menu-card.kokugo-card .card-name { color: var(--kokugo); }
    .menu-card.sansu-card .card-name { font-size: 0.95rem; color: var(--sansu); }
    .menu-card .card-sub { font-size: 0.72rem; color: var(--gray); margin-top: 4px; }
    .menu-card .card-questions {
      display: inline-block;
      margin-top: 10px;
      background: #F3F4F6;
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 0.72rem;
      color: var(--gray);
    }

    /* ===== QUIZ SCREEN ===== */
    .quiz-header {
      margin-bottom: 20px;
    }
    .quiz-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: bold;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .quiz-label.kokugo { background: #FEE2E9; color: var(--kokugo); }
    .quiz-label.sansu { background: #DBEAFE; color: var(--sansu); }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-text { font-size: 0.82rem; color: var(--gray); white-space: nowrap; }
    .progress-bar {
      flex: 1;
      height: 10px;
      background: #E5E7EB;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-fill.kokugo { background: linear-gradient(90deg, #E85D75, #F997A8); }
    .progress-fill.sansu { background: linear-gradient(90deg, #3B82F6, #60A5FA); }

    .question-card {
      background: var(--white);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      margin-top: 20px;
    }
    .question-num {
      font-size: 0.8rem;
      color: var(--gray);
      margin-bottom: 10px;
    }
    .question-text {
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: bold;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* Reading passage */
    .passage-box {
      background: #F9FAFB;
      border-left: 4px solid var(--kokugo);
      border-radius: 0 12px 12px 0;
      padding: 14px 16px;
      margin: 14px 0;
      font-size: 0.95rem;
      line-height: 1.9;
    }
    .passage-box p { margin-bottom: 6px; }
    .passage-box p:last-child { margin-bottom: 0; }

    /* Multiple choice */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 22px;
    }
    .option-btn {
      padding: 16px 12px;
      border-radius: 14px;
      border: 2.5px solid #E5E7EB;
      background: var(--white);
      font-family: inherit;
      font-size: clamp(0.95rem, 3vw, 1.05rem);
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #9CA3AF;
      background: #F9FAFB;
    }
    .option-btn.selected { border-color: var(--accent); background: #FFFBEB; }
    .option-btn.correct { border-color: var(--green); background: #D1FAE5; color: #065F46; }
    .option-btn.wrong { border-color: var(--red); background: #FEE2E2; color: #991B1B; }
    .option-btn:disabled { cursor: default; }

    /* Fill input */
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
    }
    .answer-input {
      width: 130px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2.5px solid #E5E7EB;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .answer-input:focus { border-color: var(--accent); }
    .answer-input.correct { border-color: var(--green); background: #D1FAE5; }
    .answer-input.wrong { border-color: var(--red); background: #FEE2E2; }

    .submit-btn {
      padding: 14px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #F59E0B, #FCD34D);
      color: #78350F;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(245,158,11,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,158,11,0.4); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { background: #E5E7EB; color: var(--gray); box-shadow: none; cursor: default; transform: none; }

    /* Feedback */
    .feedback-box {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: bold;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }
    .feedback-box.show { display: flex; }
    .feedback-box.correct-fb { background: #D1FAE5; color: #065F46; }
    .feedback-box.wrong-fb { background: #FEE2E2; color: #991B1B; }
    .feedback-box .fb-icon { font-size: 1.3rem; flex-shrink: 0; }
    .feedback-box .fb-text { line-height: 1.5; }

    .next-btn {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--text);
      color: var(--white);
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: none;
      transition: background 0.15s;
    }
    .next-btn:hover { background: #374151; }
    .next-btn.show { display: block; }

    /* ===== RESULT SCREEN ===== */
    .result-card {
      background: var(--white);
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      margin-top: 24px;
    }
    .result-icon { font-size: 4rem; }
    .result-title { font-size: 1.6rem; font-weight: bold; margin-top: 12px; }
    .result-score {
      font-size: 3.5rem;
      font-weight: bold;
      margin: 16px 0 4px;
    }
    .result-score .total { font-size: 1.5rem; color: var(--gray); }
    .result-stars { font-size: 1.8rem; letter-spacing: 4px; margin: 8px 0; }
    .result-message { color: var(--gray); font-size: 0.95rem; margin-top: 8px; line-height: 1.6; }

    .result-breakdown {
      background: #F9FAFB;
      border-radius: 14px;
      padding: 16px;
      margin-top: 24px;
      text-align: left;
    }
    .breakdown-title { font-size: 0.85rem; color: var(--gray); margin-bottom: 10px; }
    .breakdown-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #E5E7EB;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .breakdown-item:last-child { border-bottom: none; }
    .breakdown-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }
    .action-btn {
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .action-btn:hover { transform: translateY(-2px); }
    .action-btn.retry { background: var(--accent); color: #78350F; }
    .action-btn.back { background: #F3F4F6; color: var(--text); }

    /* ===== RECORDS BUTTON on HOME ===== */
    .records-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      border: 2px solid #E5E7EB;
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
    }
    .records-btn:hover { border-color: #9CA3AF; background: #F9FAFB; transform: translateY(-2px); }

    /* ===== RECORDS SCREEN ===== */
    .records-header { padding: 20px 0 4px; }
    .records-header h2 { font-size: 1.5rem; font-weight: bold; }

    .device-id-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #F3F4F6;
      border-radius: 12px;
      padding: 10px 14px;
      margin: 12px 0 20px;
      font-size: 0.82rem;
      color: var(--gray);
    }
    .device-id-box .did { font-family: monospace; font-weight: bold; color: var(--text); font-size: 0.88rem; }
    .copy-btn {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid #D1D5DB;
      background: var(--white);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
    }
    .copy-btn:hover { background: #F9FAFB; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 16px;
      padding: 16px 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .stat-val { font-size: 1.7rem; font-weight: bold; color: var(--text); }
    .stat-card .stat-label { font-size: 0.72rem; color: var(--gray); margin-top: 4px; }

    .section-title {
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--gray);
      margin: 0 0 10px;
      letter-spacing: 0.05em;
    }

    .category-list { margin-bottom: 24px; }
    .category-row {
      background: var(--white);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .category-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .category-row-name { font-size: 0.92rem; font-weight: bold; }
    .category-row-score { font-size: 0.82rem; color: var(--gray); }
    .category-bar-bg {
      height: 8px;
      background: #F3F4F6;
      border-radius: 8px;
      overflow: hidden;
    }
    .category-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.6s ease;
    }
    .category-bar-fill.kokugo { background: linear-gradient(90deg, #E85D75, #F997A8); }
    .category-bar-fill.sansu  { background: linear-gradient(90deg, #3B82F6, #60A5FA); }
    .category-row-stars { font-size: 0.85rem; margin-top: 6px; color: var(--accent); }
    .category-row-count { font-size: 0.72rem; color: var(--gray); }

    .history-list { margin-bottom: 24px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--white);
      border-radius: 12px;
      margin-bottom: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .history-badge {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .history-badge.kokugo { background: #FEE2E9; }
    .history-badge.sansu  { background: #DBEAFE; }
    .history-info { flex: 1; }
    .history-label { font-size: 0.88rem; font-weight: bold; }
    .history-date  { font-size: 0.72rem; color: var(--gray); margin-top: 2px; }
    .history-score { text-align: right; }
    .history-score .hs-val { font-size: 1rem; font-weight: bold; }
    .history-score .hs-pct { font-size: 0.72rem; color: var(--gray); }

    .clear-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1.5px solid #FCA5A5;
      background: #FFF5F5;
      color: #EF4444;
      font-family: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .clear-btn:hover { background: #FEE2E2; }

    .empty-records {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }
    .empty-records .empty-icon { font-size: 3rem; }
    .empty-records p { margin-top: 12px; font-size: 0.95rem; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 420px) {
      .options-grid { grid-template-columns: 1fr; }
      .subject-cards { grid-template-columns: 1fr 1fr; }
      .menu-grid { grid-template-columns: 1fr 1fr; }
      .result-actions { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>🌟 全統小チャレンジ！ 小学２年生 🌟</h1>
  <div class="subtitle">四谷学院 全国統一小学生試験 対策</div>
</header>

<div id="breadcrumb">
  <span id="bc-home" onclick="goHome()">🏠 ホーム</span>
</div>

<!-- ===== HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="container">
    <div class="home-welcome">
      <div class="mascot">📚</div>
      <h2>さあ、べんきょうを<br>はじめよう！</h2>
      <p>もんだいに チャレンジして　☆を あつめよう！</p>
    </div>
    <div class="subject-cards">
      <button class="subject-card kokugo" onclick="showKokugoMenu()">
        <div class="card-icon">📖</div>
        <div class="card-title">国 語</div>
        <div class="card-desc">かんじ・ことば・どっかい</div>
      </button>
      <button class="subject-card sansu" onclick="showSansuMenu()">
        <div class="card-icon">🔢</div>
        <div class="card-title">算 数</div>
        <div class="card-desc">けいさん・くく・ずけい</div>
      </button>
      <button class="records-btn" onclick="showRecords()">📊 学習きろくを見る</button>
    </div>
  </div>
</div>

<!-- ===== RECORDS SCREEN ===== -->
<div id="screen-records" class="screen">
  <div class="container">
    <div class="records-header">
      <h2>📊 学習きろく</h2>
    </div>
    <div class="device-id-box">
      <span>デバイスID：</span>
      <span class="did" id="device-id-display">---</span>
      <button class="copy-btn" onclick="copyDeviceId()">コピー</button>
    </div>
    <div id="records-content"></div>
  </div>
</div>

<!-- ===== KOKUGO MENU ===== -->
<div id="screen-kokugo" class="screen">
  <div class="container">
    <div class="menu-header kokugo">
      <div class="icon">📖</div>
      <h2>国 語</h2>
    </div>
    <div class="menu-desc">れんしゅうしたい もんだいを えらぼう！</div>
    <div class="menu-grid">
      <button class="menu-card kokugo-card" onclick="startQuiz('kanji-yomi')">
        <div class="card-big-icon">🔤</div>
        <div class="card-name">漢字の読み</div>
        <div class="card-sub">かんじの よみかた</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card kokugo-card" onclick="startQuiz('kanji-kaki')">
        <div class="card-big-icon">✏️</div>
        <div class="card-name">漢字の書き</div>
        <div class="card-sub">かんじを えらぼう</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card kokugo-card" onclick="startQuiz('kotoba')">
        <div class="card-big-icon">💬</div>
        <div class="card-name">言葉の意味</div>
        <div class="card-sub">はんたいご・なかまのことば</div>
        <div class="card-questions">5もん</div>
      </button>
      <button class="menu-card kokugo-card" onclick="startQuiz('dokkai')">
        <div class="card-big-icon">📝</div>
        <div class="card-name">読み取り</div>

// ===================================================

// ===================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goHome() {
  setBreadcrumb([{label:'🏠 ホーム', action:null}]);
  showScreen('home');
}

function showKokugoMenu() {
  setBreadcrumb([
    {label:'🏠 ホーム', action:'goHome()'},
    {label:'📖 国語', action:null}
  ]);
  state.parentScreen = 'kokugo';
  showScreen('kokugo');
}

function showSansuMenu() {
  setBreadcrumb([
    {label:'🏠 ホーム', action:'goHome()'},
    {label:'🔢 算数', action:null}
  ]);
  state.parentScreen = 'sansu';
  showScreen('sansu');
}

function backToMenu() {
  if (state.parentScreen === 'kokugo') showKokugoMenu();
  else showSansuMenu();
}

function setBreadcrumb(items) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = items.map((item, i) => {
    const isLast = i === items.length - 1;
    const sep = i > 0 ? '<span class="sep"> › </span>' : '';
    if (item.action) {
      return sep + '<span onclick="' + item.action + '">' + item.label + '</span>';
    }
    return sep + '<span style="color:var(--text);font-weight:bold">' + item.label + '</span>';
  }).join('');
}

// ===================================================
// QUIZ START
// ===================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(type) {
  const bank = QB[type];
  state.quizType = type;
  state.current = 0;
  state.score = 0;
  state.answers = [];
  state.answered = false;

  if (type === 'dokkai') {
    // Build flat list of passage+question pairs
    const flatQ = [];
    bank.passages.forEach(p => {
      p.questions.forEach(q => {
        flatQ.push({ passage: p.text, ...q, type: 'mc' });
      });
    });
    state.questions = flatQ.slice(0, bank.count);
  } else {
    const pool = shuffle(bank.questions);
    state.questions = pool.slice(0, bank.count);
  }

  const subject = bank.subject;
  const parentLabel = subject === 'kokugo' ? '📖 国語' : '🔢 算数';
  const parentAction = subject === 'kokugo' ? 'showKokugoMenu()' : 'showSansuMenu()';
  setBreadcrumb([
    {label:'🏠 ホーム', action:'goHome()'},
    {label: parentLabel, action: parentAction},
    {label: bank.label, action: null}
  ]);

  // Set label style
  const label = document.getElementById('quiz-label');
  label.className = 'quiz-label ' + subject;
  label.textContent = (subject === 'kokugo' ? '📖 ' : '🔢 ') + bank.label;

  // Set progress bar color
  document.getElementById('progress-fill').className = 'progress-fill ' + subject;

  showScreen('quiz');
  renderQuestion();
}

// ===================================================
// RENDER QUESTION
// ===================================================
function renderQuestion() {
  const total = state.questions.length;
  const idx = state.current;
  const q = state.questions[idx];
  const bank = QB[state.quizType];
  state.answered = false;

  // Progress
  document.getElementById('progress-text').textContent = (idx + 1) + ' / ' + total;
  const pct = (idx / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Question number & text
  document.getElementById('question-num').textContent = 'もんだい ' + (idx + 1);
  document.getElementById('question-text').textContent = q.q;

  // Passage (dokkai)
  const passageArea = document.getElementById('passage-area');
  if (q.passage) {
    passageArea.innerHTML = '<div class="passage-box">' +
      q.passage.split('\n').map(l => '<p>' + l + '</p>').join('') +
      '</div>';
  } else {
    passageArea.innerHTML = '';
  }

  // Options / Input
  const optArea = document.getElementById('options-area');
  const inpArea = document.getElementById('input-area');
  optArea.innerHTML = '';
  inpArea.innerHTML = '';

  const qType = bank.type === 'dokkai' ? 'mc' : bank.type;

  if (qType === 'mc') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectOption(i);
      btn.id = 'opt-' + i;
      grid.appendChild(btn);
    });
    optArea.appendChild(grid);
  } else {
    // fill
    inpArea.innerHTML = '<div class="input-wrap">' +
      '<input class="answer-input" type="number" id="fill-input" placeholder="こたえ" min="0" max="9999">' +
      '<button class="submit-btn" id="submit-btn" onclick="checkFill()">こたえる</button>' +
      '</div>';
    const inp = document.getElementById('fill-input');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkFill(); });
  }

  // Feedback & next
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  const isLast = idx === total - 1;
  nextBtn.textContent = isLast ? '結果を見る 🏆' : 'つぎへ →';
}

// ===================================================
// ANSWER HANDLING
// ===================================================
function selectOption(selected) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.current];
  const isCorrect = selected === q.ans;

  // Highlight options
  q.opts.forEach((_, i) => {
    const btn = document.getElementById('opt-' + i);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
  });

  recordAnswer(isCorrect, q.opts[selected], q.opts[q.ans], q);
  showFeedback(isCorrect, q);
}

function checkFill() {
  if (state.answered) return;
  const inp = document.getElementById('fill-input');
  const val = parseInt(inp.value, 10);
  if (isNaN(val)) { inp.focus(); return; }

  state.answered = true;
  const q = state.questions[state.current];
  const isCorrect = val === q.ans;

  inp.classList.add(isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;
  document.getElementById('submit-btn').disabled = true;

  if (!isCorrect) {
    // Show correct answer hint
    const hint = document.createElement('div');
    hint.style.cssText = 'margin-top:8px;font-size:0.88rem;color:#065F46;background:#D1FAE5;padding:8px 12px;border-radius:10px;';
    hint.textContent = 'こたえ：' + q.ans;
    document.getElementById('input-area').appendChild(hint);
  }

  recordAnswer(isCorrect, String(val), String(q.ans), q);
  showFeedback(isCorrect, q);
}

function recordAnswer(isCorrect, userAns, correctAns, q) {
  if (isCorrect) state.score++;
  state.answers.push({
    correct: isCorrect,
    question: q.q.replace(/\n/g,' '),
    userAns,
    correctAns,
    hint: q.hint || null
  });
}

function showFeedback(isCorrect, q) {
  const fb = document.getElementById('feedback-box');
  const icon = document.getElementById('fb-icon');
  const text = document.getElementById('fb-text');

  if (isCorrect) {
    fb.className = 'feedback-box correct-fb show';
    icon.textContent = '⭕';
    const msgs = ['せいかい！すごい！','すばらしい！','よくできました！','かんぺき！','その調子！'];
    text.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  } else {
    fb.className = 'feedback-box wrong-fb show';
    icon.textContent = '❌';
    let msg = 'ざんねん！';
    if (q.hint) msg += '　ヒント：' + q.hint;
    text.textContent = msg;
  }

  document.getElementById('next-btn').className = 'next-btn show';
}

// ===================================================
// NEXT QUESTION
// ===================================================
function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ===================================================
// RESULT
// ===================================================
function showResult() {
  const score = state.score;
  const total = state.questions.length;
  const pct = score / total;

  // Update progress bar to 100%
  document.getElementById('progress-fill').style.width = '100%';

  const el = id => document.getElementById(id);

  // Icon & title
  let icon, title, message;
  if (pct === 1) {
    icon = '🏆'; title = 'かんぺき！'; message = 'ぜんもん せいかい！\nすごい！きみは 天才だ！';
  } else if (pct >= 0.8) {
    icon = '🌟'; title = 'すばらしい！'; message = 'ほぼ かんぺき！\nもう少しで 満点（まんてん）だよ！';
  } else if (pct >= 0.6) {
    icon = '😊'; title = 'よくできました！'; message = 'なかなか いいね！\nまちがえた もんだいを ふくしゅうしよう！';
  } else if (pct >= 0.4) {
    icon = '💪'; title = 'もう少し！'; message = 'もう一度 チャレンジして\nしっかり おぼえよう！';
  } else {
    icon = '📚'; title = 'れんしゅうしよう！'; message = 'むずかしかったね。\nいっしょに べんきょうしよう！';
  }

  el('result-icon').textContent = icon;
  el('result-title').textContent = title;
  el('result-score').innerHTML = score + '<span class="total"> / ' + total + '</span>';

  // Stars
  const stars = Math.round(pct * 5);
  el('result-stars').textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);

  el('result-message').textContent = message;

  // Breakdown
  const bd = el('result-breakdown');
  bd.innerHTML = '<div class="breakdown-title">もんだいの ふりかえり</div>' +
    state.answers.map(a => {
      const icon2 = a.correct ? '⭕' : '❌';
      let detail = a.question;
      if (!a.correct) detail += '　→ こたえ：' + a.correctAns;
      return '<div class="breakdown-item"><span class="breakdown-icon">' + icon2 + '</span><span>' + detail + '</span></div>';
    }).join('');

  saveRecord(state.quizType, score, total);
  showScreen('result');
}

function retryQuiz() {
  startQuiz(state.quizType);
}

// ===================================================
// DEVICE ID & RECORDS (localStorage)
// ===================================================
const DEVICE_KEY  = 'zentouho_device_id';
const RECORDS_KEY = 'zentouho_records';

function uuid4() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function getDeviceId() {
  let id = localStorage.getItem(DEVICE_KEY);
  if (!id) { id = uuid4(); localStorage.setItem(DEVICE_KEY, id); }
  return id;
}

function getRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); }
  catch { return []; }
}

function saveRecord(quizType, score, total) {
  const records = getRecords();
  const bank = QB[quizType];
  records.push({
    id: uuid4(),
    deviceId: getDeviceId(),
    date: new Date().toISOString(),
    quizType,
    label: bank.label,
    subject: bank.subject,
    score,
    total
  });
  if (records.length > 500) records.splice(0, records.length - 500);
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
}

function copyDeviceId() {
  const id = getDeviceId();
  navigator.clipboard && navigator.clipboard.writeText(id).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'コピー済み ✓';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  });
}

// ===================================================
// RECORDS SCREEN
// ===================================================
function showRecords() {
  setBreadcrumb([
    {label:'🏠 ホーム', action:'goHome()'},
    {label:'📊 学習きろく', action:null}
  ]);
  state.parentScreen = null;

  document.getElementById('device-id-display').textContent = getDeviceId().slice(0, 12) + '…';
  renderRecordsContent();
  showScreen('records');
}

function renderRecordsContent() {
  const records = getRecords();
  const el = document.getElementById('records-content');

  if (records.length === 0) {
    el.innerHTML = '<div class="empty-records"><div class="empty-icon">📭</div><p>まだ きろくが ありません。<br>もんだいに チャレンジしよう！</p></div>';
    return;
  }

  // ---- stats ----
  const totalQ = records.reduce((s, r) => s + r.total, 0);
  const totalC = records.reduce((s, r) => s + r.score, 0);
  const pctAll = totalQ > 0 ? Math.round(totalC / totalQ * 100) : 0;
  const days = new Set(records.map(r => r.date.slice(0, 10))).size;

  let html = '<div class="stats-grid">'
    + statCard(records.length + '回', 'チャレンジ数')
    + statCard(pctAll + '%', '正答率')
    + statCard(days + '日', '学習日数')
    + '</div>';

  // ---- per-category best ----
  const cats = Object.keys(QB);
  const kokugo = cats.filter(k => QB[k].subject === 'kokugo');
  const sansu  = cats.filter(k => QB[k].subject === 'sansu');

  html += '<div class="section-title">📖 国語 カテゴリ別 さいこうスコア</div><div class="category-list">';
  html += kokugo.map(k => categoryRow(k, records, 'kokugo')).join('');
  html += '</div>';

  html += '<div class="section-title">🔢 算数 カテゴリ別 さいこうスコア</div><div class="category-list">';
  html += sansu.map(k => categoryRow(k, records, 'sansu')).join('');
  html += '</div>';

  // ---- recent 15 ----
  const recent = [...records].reverse().slice(0, 15);
  html += '<div class="section-title">さいきんの きろく（最新15件）</div><div class="history-list">';
  html += recent.map(r => {
    const icon = QB[r.quizType].subject === 'kokugo' ? '📖' : '🔢';
    const subj = QB[r.quizType].subject;
    const pct  = Math.round(r.score / r.total * 100);
    const dt   = new Date(r.date);
    const dateStr = dt.getFullYear() + '/' + pad(dt.getMonth()+1) + '/' + pad(dt.getDate())
      + ' ' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());
    return '<div class="history-item">'
      + '<div class="history-badge ' + subj + '">' + icon + '</div>'
      + '<div class="history-info"><div class="history-label">' + r.label + '</div>'
      + '<div class="history-date">' + dateStr + '</div></div>'
      + '<div class="history-score"><div class="hs-val">' + r.score + '/' + r.total + '</div>'
      + '<div class="hs-pct">' + pct + '%</div></div>'
      + '</div>';
  }).join('');
  html += '</div>';

  html += '<button class="clear-btn" onclick="clearRecords()">🗑 きろくをすべて消す</button>';

  el.innerHTML = html;
}

function statCard(val, label) {
  return '<div class="stat-card"><div class="stat-val">' + val + '</div><div class="stat-label">' + label + '</div></div>';
}

function categoryRow(quizType, records, subject) {
  const bank = QB[quizType];
  const mine = records.filter(r => r.quizType === quizType);
  if (mine.length === 0) {
    return '<div class="category-row">'
      + '<div class="category-row-top"><span class="category-row-name">' + bank.label + '</span>'
      + '<span class="category-row-score">未挑戦</span></div>'
      + '<div class="category-bar-bg"><div class="category-bar-fill ' + subject + '" style="width:0%"></div></div>'
      + '<div class="category-row-stars">☆☆☆☆☆</div><div class="category-row-count">0回</div>'
      + '</div>';
  }
  const best = Math.max(...mine.map(r => r.score / r.total));
  const pct  = Math.round(best * 100);
  const stars = Math.round(best * 5);
  const starStr = '★'.repeat(stars) + '☆'.repeat(5 - stars);
  const avgPct = Math.round(mine.reduce((s,r)=>s+r.score/r.total,0)/mine.length*100);
  return '<div class="category-row">'
    + '<div class="category-row-top"><span class="category-row-name">' + bank.label + '</span>'
    + '<span class="category-row-score">最高 ' + pct + '% ／ 平均 ' + avgPct + '%</span></div>'
    + '<div class="category-bar-bg"><div class="category-bar-fill ' + subject + '" style="width:' + pct + '%"></div></div>'
    + '<div class="category-row-stars">' + starStr + '</div>'
    + '<div class="category-row-count">' + mine.length + '回 チャレンジ</div>'
    + '</div>';
}

function pad(n) { return String(n).padStart(2, '0'); }

function clearRecords() {
  if (!confirm('きろくを ぜんぶ けしますか？\nこの そうさは もとに もどせません。')) return;
  localStorage.removeItem(RECORDS_KEY);
  renderRecordsContent();
}

// ===================================================
// INIT
// ===================================================
setBreadcrumb([{label:'🏠 ホーム', action:null}]);
getDeviceId(); // ensure device ID is created on first visit
</script>
